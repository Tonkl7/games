<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Battler Arena Engine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Menu Scene */
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            z-index: 100;
        }
        .menu-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }
        h1 { margin-top: 0; color: #e94560; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; }
        .selector { margin: 20px 0; display: flex; justify-content: space-between; align-items: center; gap: 20px;}
        select {
            padding: 10px;
            font-size: 16px;
            background: #222;
            color: #fff;
            border: 1px solid #e94560;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }
        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        button:hover { background: #ff5c77; transform: scale(1.05); }

        /* Arena UI */
        #game-ui {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        
        /* Top HUD */
        #header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }
        .p1-text { color: #4facfe; }
        .p2-text { color: #ff0844; }

        /* Bottom HUD */
        #footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .player-panel {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            width: 300px;
            backdrop-filter: blur(5px);
        }
        #p1-panel { border-color: #4facfe; }
        #p2-panel { border-color: #ff0844; }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px;}
        .passive-text { font-style: italic; color: #ddd; margin-bottom: 10px; font-size: 13px; height: 18px;}
        
        /* Bars */
        .bar-container { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin-bottom: 8px; border: 1px solid #000; }
        .hp-bar { height: 100%; transition: width 0.2s; }
        #p1-hp { background: linear-gradient(90deg, #00c6ff, #0072ff); }
        #p2-hp { background: linear-gradient(90deg, #ff0844, #ffb199); }
        
        .ult-bar { height: 100%; background: linear-gradient(90deg, #f6d365, #fda085); transition: width 0.2s; width: 0%; }
        
        /* Canvas */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Visual Feedback */
        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 20;
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>

    <!-- Scene 1: Main Menu -->
    <div id="menu">
        <div class="menu-box">
            <h1>Auto-Battler Engine</h1>
            <div class="selector">
                <label style="color:#4facfe; font-weight:bold;">Player 1 Weapon:</label>
                <select id="p1-weapon"></select>
            </div>
            <div class="selector">
                <label style="color:#ff0844; font-weight:bold;">Player 2 Weapon:</label>
                <select id="p2-weapon"></select>
            </div>
            <button id="start-btn">Enter Arena</button>
        </div>
    </div>

    <!-- Scene 2: Game UI -->
    <div id="game-ui">
        <div id="header">
            <span class="p1-text" id="p1-title">P1: Sword</span> <span style="color:#777">vs</span> <span class="p2-text" id="p2-title">P2: Bow</span>
        </div>
        
        <div id="footer">
            <div class="player-panel" id="p1-panel">
                <div class="stat-row"><span>HP</span><span id="p1-hp-text">100/100</span></div>
                <div class="bar-container"><div class="hp-bar" id="p1-hp" style="width: 100%"></div></div>
                <div class="stat-row"><span style="color:#f6d365">Ultimate</span><span id="p1-ult-text">0%</span></div>
                <div class="bar-container"><div class="ult-bar" id="p1-ult"></div></div>
                <div class="passive-text" id="p1-passive">Passive: --</div>
            </div>

            <div class="player-panel" id="p2-panel">
                <div class="stat-row"><span>HP</span><span id="p2-hp-text">100/100</span></div>
                <div class="bar-container"><div class="hp-bar" id="p2-hp" style="width: 100%"></div></div>
                <div class="stat-row"><span style="color:#f6d365">Ultimate</span><span id="p2-ult-text">0%</span></div>
                <div class="bar-container"><div class="ult-bar" id="p2-ult"></div></div>
                <div class="passive-text" id="p2-passive">Passive: --</div>
            </div>
        </div>
    </div>

    <div id="flash-overlay"></div>
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * ------------------------------------------------------------------
 * UTILITIES & MATH
 * ------------------------------------------------------------------
 */
const MathUtils = {
    distance: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1),
    randRange: (min, max) => Math.random() * (max - min) + min,
    clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
    normalize: (vx, vy) => {
        let len = Math.hypot(vx, vy);
        if (len === 0) return {x: 0, y: 0};
        return {x: vx / len, y: vy / len};
    }
};

/**
 * ------------------------------------------------------------------
 * WEAPON REGISTRY (MODDABLE SYSTEM)
 * ------------------------------------------------------------------
 * To add a new weapon, just define it here. The engine will handle the rest.
 */
const WEAPON_REGISTRY = {
    "Sword": {
        name: "Sword",
        color: "#ccc",
        width: 8,
        length: 50,
        baseDamage: 8,
        
        // Custom init state
        init(player) {
            player.custom.dmgBonus = 0;
            player.custom.spinSpeed = 0.08;
            player.passiveText = `DMG Bonus: +0`;
        },
        
        // Runs every frame
        onUpdate(player, enemy, game) {
            // Apply rotation
            player.weaponRotation += player.custom.spinSpeed * player.weaponDir * (game.delta / 16);
            
            // Ultimate logic (faster spin, larger range)
            if (player.ultimateActive) {
                player.weaponReach = 90;
                player.custom.spinSpeed = 0.2;
                player.custom.dmgBonus += 0.01; // Scale during ult
            } else {
                player.weaponReach = 50;
                player.custom.spinSpeed = 0.08;
            }
            player.passiveText = `DMG Bonus: +${Math.floor(player.custom.dmgBonus)}`;
        },
        
        onHitPlayer(player, enemy, game) {
            // Passive: Increase damage on every successful hit
            player.custom.dmgBonus += 2;
            let dmg = this.baseDamage + player.custom.dmgBonus;
            enemy.takeDamage(dmg, "physical", player, game);
            
            // Slight knockback
            let dx = enemy.x - player.x;
            let dy = enemy.y - player.y;
            let n = MathUtils.normalize(dx, dy);
            enemy.applyForce(n.x * 10, n.y * 10);
            
            player.reverseWeapon();
        },
        
        onHitWeapon(player, enemy, game) {
            // Clash effect
            game.spawnParticles(player.weaponX, player.weaponY, 5, "#fff");
            player.reverseWeapon();
        },
        
        onUltimateActivate(player, game) {
            // Instant heal on ult
            player.hp = Math.min(player.maxHp, player.hp + 20);
        }
    },

    "Bow": {
        name: "Bow",
        color: "#8b5a2b",
        width: 10,
        length: 30,
        baseDamage: 5,

        init(player) {
            player.custom.arrowCount = 1;
            player.custom.shootTimer = 0;
            player.custom.shotsFired = 0;
            player.passiveText = `Arrows per shot: 1`;
        },

        onUpdate(player, enemy, game) {
            // Rotate to aim generally towards enemy, but with some drift
            let dx = enemy.x - player.x;
            let dy = enemy.y - player.y;
            let targetAngle = Math.atan2(dy, dx);
            
            // Interpolate rotation
            let diff = targetAngle - player.weaponRotation;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            player.weaponRotation += diff * 0.05 * (game.delta/16);

            player.weaponReach = 40;

            // Shoot logic
            player.custom.shootTimer -= game.delta;
            let fireRate = player.ultimateActive ? 100 : 800;
            
            if (player.custom.shootTimer <= 0) {
                player.custom.shootTimer = fireRate;
                
                // Spawn arrows
                let count = player.ultimateActive ? player.custom.arrowCount + 2 : player.custom.arrowCount;
                let spread = 0.2; // radians
                let startAngle = player.weaponRotation - (spread * (count - 1)) / 2;

                for(let i=0; i<count; i++) {
                    let angle = startAngle + (i * spread);
                    game.spawn(this.createArrow(player, angle));
                }
                
                player.custom.shotsFired++;
                // Passive: Every 5 shots, increase arrow count
                if (player.custom.shotsFired % 5 === 0 && player.custom.arrowCount < 5) {
                    player.custom.arrowCount++;
                    player.passiveText = `Arrows per shot: ${player.custom.arrowCount}`;
                }
            }
        },

        createArrow(owner, angle) {
            return {
                x: owner.weaponX,
                y: owner.weaponY,
                vx: Math.cos(angle) * 12,
                vy: Math.sin(angle) * 12,
                radius: 4,
                lifetime: 2000,
                owner: owner,
                type: "projectile",
                
                update(game) {
                    this.x += this.vx * (game.delta/16);
                    this.y += this.vy * (game.delta/16);
                    this.lifetime -= game.delta;
                    
                    // Collision with enemy
                    let enemy = game.players.find(p => p !== this.owner);
                    if (MathUtils.distance(this.x, this.y, enemy.x, enemy.y) < this.radius + enemy.radius) {
                        enemy.takeDamage(5, "pierce", this.owner, game);
                        game.spawnParticles(this.x, this.y, 3, "#fff");
                        this.lifetime = 0; // destroy
                    }
                },
                render(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(Math.atan2(this.vy, this.vx));
                    ctx.fillStyle = "#fff";
                    ctx.fillRect(-6, -2, 12, 4);
                    ctx.restore();
                }
            };
        },

        onHitPlayer(player, enemy, game) {
            // Bow melee hit (weak)
            enemy.takeDamage(2, "blunt", player, game);
            player.reverseWeapon();
        },
        
        onHitWeapon(player, enemy, game) {
            player.reverseWeapon();
        }
    },

    "Magic Orb": {
        name: "Magic Orb",
        color: "#9d4edd",
        width: 15, // Used as radius for orb
        length: 60, // Distance from player
        baseDamage: 3,

        init(player) {
            player.custom.zoneTimer = 0;
            player.custom.burnStacksApplied = 0;
            player.passiveText = `Burn Stacks Applied: 0`;
        },

        onUpdate(player, enemy, game) {
            player.weaponRotation += 0.04 * player.weaponDir * (game.delta/16);
            player.weaponReach = 60;

            // Spawn damaging zones periodically
            player.custom.zoneTimer -= game.delta;
            let zoneInterval = player.ultimateActive ? 300 : 1500;

            if (player.custom.zoneTimer <= 0) {
                player.custom.zoneTimer = zoneInterval;
                game.spawn(this.createZone(player));
            }

            // Ultimate: Pull enemy
            if (player.ultimateActive) {
                let dx = player.x - enemy.x;
                let dy = player.y - enemy.y;
                let n = MathUtils.normalize(dx, dy);
                enemy.applyForce(n.x * 0.5, n.y * 0.5); // Gravity pull
            }
        },

        createZone(owner) {
            return {
                x: owner.weaponX,
                y: owner.weaponY,
                radius: 1,
                maxRadius: 40,
                lifetime: 4000,
                owner: owner,
                type: "zone",
                tickTimer: 0,
                
                update(game) {
                    // Expand
                    if (this.radius < this.maxRadius) this.radius += 1 * (game.delta/16);
                    this.lifetime -= game.delta;
                    this.tickTimer -= game.delta;

                    // Apply burn to enemy inside
                    if (this.tickTimer <= 0) {
                        this.tickTimer = 500; // tick every 0.5s
                        let enemy = game.players.find(p => p !== this.owner);
                        if (MathUtils.distance(this.x, this.y, enemy.x, enemy.y) < this.radius + enemy.radius) {
                            enemy.addStatus({
                                type: "burn",
                                duration: 2000,
                                tickTimer: 0,
                                update(p, g) {
                                    this.tickTimer -= g.delta;
                                    if(this.tickTimer <= 0) {
                                        this.tickTimer = 400;
                                        p.takeDamage(2, "magic", null, g);
                                        // Visual tick
                                        g.spawnParticles(p.x, p.y + Math.random()*20-10, 1, "#ff5500");
                                    }
                                }
                            });
                            this.owner.custom.burnStacksApplied++;
                            this.owner.passiveText = `Burn Stacks Applied: ${this.owner.custom.burnStacksApplied}`;
                        }
                    }
                },
                render(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(157, 78, 221, ${this.lifetime / 4000 * 0.4})`;
                    ctx.fill();
                    ctx.strokeStyle = `rgba(157, 78, 221, ${this.lifetime / 4000})`;
                    ctx.stroke();
                }
            };
        },

        onHitPlayer(player, enemy, game) {
            enemy.takeDamage(this.baseDamage, "magic", player, game);
            player.reverseWeapon();
        },
        
        onHitWeapon(player, enemy, game) {
            player.reverseWeapon();
        }
    }
};

/**
 * ------------------------------------------------------------------
 * ENGINE CLASSES
 * ------------------------------------------------------------------
 */

class Player {
    constructor(id, x, y, color, weaponName) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.radius = 20;
        this.color = color;
        
        this.maxHp = 100;
        this.hp = this.maxHp;
        
        // Weapon System
        this.weaponDef = WEAPON_REGISTRY[weaponName];
        this.weaponRotation = Math.random() * Math.PI * 2;
        this.weaponDir = 1; // 1 or -1
        this.weaponReach = this.weaponDef.length;
        this.weaponHitboxRadius = this.weaponDef.width;
        this.weaponCooldown = 0; // Prevent multi-hit spam
        
        this.custom = {}; // For modder weapon specific data
        this.passiveText = "";
        
        // Status & Ultimate
        this.statusEffects = [];
        this.ultimateGauge = 0;
        this.ultimateActive = false;
        this.ultimateTimer = 0;
        this.iFrames = 0;

        // Init weapon hook
        if(this.weaponDef.init) this.weaponDef.init(this);
    }

    // Computed weapon position
    get weaponX() { return this.x + Math.cos(this.weaponRotation) * this.weaponReach; }
    get weaponY() { return this.y + Math.sin(this.weaponRotation) * this.weaponReach; }

    update(game) {
        let dtMod = game.delta / 16;

        // Apply velocities
        this.x += this.vx * dtMod;
        this.y += this.vy * dtMod;

        // Friction / Air resistance
        this.vx *= 0.99;
        this.vy *= 0.99;

        // Constrain speed
        let speed = Math.hypot(this.vx, this.vy);
        if (speed > 15) {
            this.vx = (this.vx / speed) * 15;
            this.vy = (this.vy / speed) * 15;
        } else if (speed < 2) {
            // Force minimum speed to keep action going
            if(speed === 0) { this.vx = 1; this.vy = 1; }
            let n = MathUtils.normalize(this.vx, this.vy);
            this.vx += n.x * 0.2;
            this.vy += n.y * 0.2;
        }

        // Timers
        if (this.iFrames > 0) this.iFrames -= game.delta;
        if (this.weaponCooldown > 0) this.weaponCooldown -= game.delta;

        // Process Status Effects
        for (let i = this.statusEffects.length - 1; i >= 0; i--) {
            let effect = this.statusEffects[i];
            effect.duration -= game.delta;
            if (effect.update) effect.update(this, game);
            if (effect.duration <= 0) this.statusEffects.splice(i, 1);
        }

        // Ultimate Logic
        if (this.ultimateActive) {
            this.ultimateTimer -= game.delta;
            this.ultimateGauge = (this.ultimateTimer / 5000) * 100; // 5 sec duration
            if (this.ultimateTimer <= 0) {
                this.ultimateActive = false;
                this.ultimateGauge = 0;
            }
        }

        // Update Weapon
        let enemy = game.players.find(p => p !== this);
        if (this.weaponDef.onUpdate) {
            this.weaponDef.onUpdate(this, enemy, game);
        }

        // Engine-level Arena Bounds Collision
        this.handleWallCollision(game.arena);
    }

    handleWallCollision(arena) {
        const bounce = 0.8;
        const perturb = () => (Math.random() - 0.5) * 2; // Anti-infinite loop
        
        if (this.x - this.radius < arena.x) {
            this.x = arena.x + this.radius;
            this.vx = Math.abs(this.vx) * bounce + perturb();
            this.vy += perturb();
        } else if (this.x + this.radius > arena.x + arena.size) {
            this.x = arena.x + arena.size - this.radius;
            this.vx = -Math.abs(this.vx) * bounce + perturb();
            this.vy += perturb();
        }
        
        if (this.y - this.radius < arena.y) {
            this.y = arena.y + this.radius;
            this.vy = Math.abs(this.vy) * bounce + perturb();
            this.vx += perturb();
        } else if (this.y + this.radius > arena.y + arena.size) {
            this.y = arena.y + arena.size - this.radius;
            this.vy = -Math.abs(this.vy) * bounce + perturb();
            this.vx += perturb();
        }
    }

    render(ctx) {
        // Draw Status Auras
        if (this.statusEffects.some(e => e.type === "burn")) {
            ctx.shadowColor = "#ff5500";
            ctx.shadowBlur = 10;
        }

        // Draw Player Body
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.iFrames > 0 ? "#fff" : this.color;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = this.ultimateActive ? "#f6d365" : "#fff";
        ctx.stroke();

        ctx.shadowBlur = 0; // reset

        // Draw Weapon
        let wx = this.weaponX;
        let wy = this.weaponY;

        ctx.save();
        ctx.translate(wx, wy);
        ctx.rotate(this.weaponRotation);
        
        ctx.fillStyle = this.weaponDef.color;
        
        // Shape based on weapon for flair
        if (this.weaponDef.name === "Magic Orb") {
            ctx.beginPath();
            ctx.arc(0, 0, this.weaponHitboxRadius, 0, Math.PI * 2);
            ctx.fill();
        } else {
            // Rectangle
            ctx.fillRect(-this.weaponHitboxRadius, -this.weaponHitboxRadius, this.weaponHitboxRadius*2, this.weaponHitboxRadius*2);
            // Weapon trail/line connection to player
            ctx.restore();
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(wx, wy);
            ctx.strokeStyle = this.weaponDef.color;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5;
            ctx.stroke();
        }
        
        ctx.restore();
    }

    applyForce(fx, fy) {
        this.vx += fx;
        this.vy += fy;
    }

    takeDamage(amount, type, source, game) {
        if (this.iFrames > 0) return; // Invincible
        
        this.hp = Math.max(0, this.hp - amount);
        this.iFrames = 200; // 0.2 seconds i-frames
        game.triggerHitStop(50); // 50ms freeze
        game.flashScreen();
        game.spawnParticles(this.x, this.y, 10, source ? source.color : "#fff");

        // Source gains ultimate gauge
        if (source && !source.ultimateActive && source.id) {
            source.ultimateGauge += amount * 2;
            if (source.ultimateGauge >= 100) {
                source.ultimateGauge = 100;
                source.ultimateActive = true;
                source.ultimateTimer = 5000;
                if(source.weaponDef.onUltimateActivate) source.weaponDef.onUltimateActivate(source, game);
                game.spawnParticles(source.x, source.y, 30, "#f6d365"); // Ult activation burst
            }
        }
        
        // Weapon event hook
        if (this.weaponDef.onTakeDamage) {
            this.weaponDef.onTakeDamage(this, source, game);
        }
    }

    addStatus(effect) {
        // Prevent stacking infinite burns, refresh duration if exists
        let existing = this.statusEffects.find(e => e.type === effect.type);
        if (existing) {
            existing.duration = Math.max(existing.duration, effect.duration);
        } else {
            this.statusEffects.push(effect);
        }
    }

    reverseWeapon() {
        if (this.weaponCooldown <= 0) {
            this.weaponDir *= -1;
            this.weaponCooldown = 200; // 0.2s cooldown before changing dir again
        }
    }
}

/**
 * ------------------------------------------------------------------
 * MAIN ENGINE OBJECT
 * ------------------------------------------------------------------
 */
const Engine = {
    canvas: document.getElementById('gameCanvas'),
    ctx: document.getElementById('gameCanvas').getContext('2d'),
    width: window.innerWidth,
    height: window.innerHeight,
    
    arena: { x: 0, y: 0, size: 0 }, // ตัวแปรเก็บตำแหน่งและขนาดของอารีนา
    
    players: [],
    entities: [],
    particles: [],
    
    lastTime: 0,
    delta: 0,
    hitStop: 0,
    
    state: 'MENU', // MENU, PLAYING, GAMEOVER
    
    init() {
        // Resize handler
        window.addEventListener('resize', () => {
            this.width = window.innerWidth;
            this.height = window.innerHeight;
            this.canvas.width = this.width;
            this.canvas.height = this.height;
            
            // คำนวณขนาดอารีนาให้เป็นสี่เหลี่ยมจัตุรัสและไม่ทับ UI
            let headerH = 80;
            let footerH = 180;
            let maxArenaH = this.height - headerH - footerH;
            let maxArenaW = this.width - 40; // เว้นขอบซ้ายขวา
            
            this.arena.size = Math.min(maxArenaW, maxArenaH);
            // จัดกึ่งกลางหน้าจอ
            this.arena.x = (this.width - this.arena.size) / 2;
            this.arena.y = headerH + (maxArenaH - this.arena.size) / 2;
        });
        window.dispatchEvent(new Event('resize'));
        
        // Populate Dropdowns
        const p1Select = document.getElementById('p1-weapon');
        const p2Select = document.getElementById('p2-weapon');
        for (let w in WEAPON_REGISTRY) {
            p1Select.add(new Option(w, w));
            p2Select.add(new Option(w, w));
        }
        p2Select.selectedIndex = 1; // Default P2 to Bow

        // Start Button
        document.getElementById('start-btn').addEventListener('click', () => {
            let w1 = p1Select.value;
            let w2 = p2Select.value;
            this.startGame(w1, w2);
        });

        // Start Loop
        requestAnimationFrame((t) => this.loop(t));
    },

    startGame(w1, w2) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        
        // Update UI Text
        document.getElementById('p1-title').innerText = `P1: ${w1}`;
        document.getElementById('p2-title').innerText = `P2: ${w2}`;

        // Reset state & เกิดในอารีนา
        this.players = [
            new Player("p1", this.arena.x + this.arena.size * 0.25, this.arena.y + this.arena.size / 2, "#4facfe", w1),
            new Player("p2", this.arena.x + this.arena.size * 0.75, this.arena.y + this.arena.size / 2, "#ff0844", w2)
        ];
        
        // Push towards each other initially
        this.players[0].vx = 5;
        this.players[1].vx = -5;

        this.entities = [];
        this.particles = [];
        this.hitStop = 0;
        this.state = 'PLAYING';
    },

    spawn(entity) {
        this.entities.push(entity);
    },

    spawnParticles(x, y, count, color) {
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 5 + 2;
            this.particles.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1.0,
                color: color
            });
        }
    },

    triggerHitStop(ms) {
        this.hitStop = ms;
    },
    
    flashScreen() {
        const flash = document.getElementById('flash-overlay');
        flash.style.opacity = '0.5';
        setTimeout(() => flash.style.opacity = '0', 50);
    },

    updateUI() {
        const p1 = this.players[0];
        const p2 = this.players[1];

        // HP
        document.getElementById('p1-hp').style.width = `${(p1.hp / p1.maxHp) * 100}%`;
        document.getElementById('p1-hp-text').innerText = `${Math.ceil(p1.hp)}/${p1.maxHp}`;
        document.getElementById('p2-hp').style.width = `${(p2.hp / p2.maxHp) * 100}%`;
        document.getElementById('p2-hp-text').innerText = `${Math.ceil(p2.hp)}/${p2.maxHp}`;

        // Ult
        document.getElementById('p1-ult').style.width = `${p1.ultimateGauge}%`;
        document.getElementById('p1-ult').style.background = p1.ultimateActive ? "#fff" : "linear-gradient(90deg, #f6d365, #fda085)";
        document.getElementById('p1-ult-text').innerText = p1.ultimateActive ? "ACTIVE" : `${Math.floor(p1.ultimateGauge)}%`;
        
        document.getElementById('p2-ult').style.width = `${p2.ultimateGauge}%`;
        document.getElementById('p2-ult').style.background = p2.ultimateActive ? "#fff" : "linear-gradient(90deg, #f6d365, #fda085)";
        document.getElementById('p2-ult-text').innerText = p2.ultimateActive ? "ACTIVE" : `${Math.floor(p2.ultimateGauge)}%`;

        // Passives
        document.getElementById('p1-passive').innerText = `Passive: ${p1.passiveText}`;
        document.getElementById('p2-passive').innerText = `Passive: ${p2.passiveText}`;
    },

    checkCollisions() {
        let p1 = this.players[0];
        let p2 = this.players[1];

        // 1. Player vs Player Body Collision (Elastic Bounce)
        let dx = p2.x - p1.x;
        let dy = p2.y - p1.y;
        let dist = Math.hypot(dx, dy);
        let minDist = p1.radius + p2.radius;
        
        if (dist < minDist) {
            // Separate
            let overlap = minDist - dist;
            let nx = dx / dist;
            let ny = dy / dist;
            p1.x -= nx * overlap / 2;
            p1.y -= ny * overlap / 2;
            p2.x += nx * overlap / 2;
            p2.y += ny * overlap / 2;
            
            // Exchange velocities (simple elastic)
            let tx = p1.vx; let ty = p1.vy;
            p1.vx = p2.vx; p1.vy = p2.vy;
            p2.vx = tx; p2.vy = ty;
        }

        // 2. Weapon vs Player
        [ [p1, p2], [p2, p1] ].forEach(([attacker, target]) => {
            let wx = attacker.weaponX;
            let wy = attacker.weaponY;
            let wRadius = attacker.weaponHitboxRadius;
            
            if (MathUtils.distance(wx, wy, target.x, target.y) < wRadius + target.radius) {
                if(attacker.weaponCooldown <= 0 && attacker.weaponDef.onHitPlayer) {
                    attacker.weaponDef.onHitPlayer(attacker, target, this);
                }
            }
        });

        // 3. Weapon vs Weapon
        let wDist = MathUtils.distance(p1.weaponX, p1.weaponY, p2.weaponX, p2.weaponY);
        if (wDist < p1.weaponHitboxRadius + p2.weaponHitboxRadius) {
            if(p1.weaponCooldown <= 0 && p1.weaponDef.onHitWeapon) p1.weaponDef.onHitWeapon(p1, p2, this);
            if(p2.weaponCooldown <= 0 && p2.weaponDef.onHitWeapon) p2.weaponDef.onHitWeapon(p2, p1, this);
        }
    },

    loop(timestamp) {
        this.delta = timestamp - this.lastTime;
        this.lastTime = timestamp;
        
        // Cap delta to prevent huge jumps on tab switch
        if (this.delta > 100) this.delta = 16; 

        if (this.state === 'PLAYING') {
            
            if (this.hitStop > 0) {
                this.hitStop -= this.delta;
            } else {
                // Update Players
                this.players.forEach(p => p.update(this));
                
                // Physics/Collisions Core
                this.checkCollisions();

                // Update Entities
                for (let i = this.entities.length - 1; i >= 0; i--) {
                    let e = this.entities[i];
                    e.update(this);
                    if (e.lifetime <= 0) this.entities.splice(i, 1);
                }

                // Update Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx * (this.delta/16);
                    p.y += p.vy * (this.delta/16);
                    p.life -= 0.05 * (this.delta/16);
                    if (p.life <= 0) this.particles.splice(i, 1);
                }

                this.updateUI();

                // Win Condition
                if (this.players[0].hp <= 0 || this.players[1].hp <= 0) {
                    this.state = 'GAMEOVER';
                    let winner = this.players[0].hp > 0 ? "Player 1" : "Player 2";
                    setTimeout(() => {
                        alert(`${winner} Wins! Engine resets.`);
                        document.getElementById('menu').style.display = 'flex';
                        document.getElementById('game-ui').style.display = 'none';
                        this.state = 'MENU';
                    }, 1000);
                }
            }

            // Render
            this.ctx.fillStyle = "#111"; // clear screen
            this.ctx.fillRect(0, 0, this.width, this.height);
            
            // วาดพื้นหลังอารีนา
            this.ctx.fillStyle = "#16161a";
            this.ctx.fillRect(this.arena.x, this.arena.y, this.arena.size, this.arena.size);

            // วาดตารางกริดเฉพาะในอารีนา
            this.ctx.strokeStyle = "#222";
            this.ctx.lineWidth = 1;
            this.ctx.beginPath();
            for(let i=0; i<=this.arena.size; i+=50) {
                this.ctx.moveTo(this.arena.x + i, this.arena.y); 
                this.ctx.lineTo(this.arena.x + i, this.arena.y + this.arena.size);
                this.ctx.moveTo(this.arena.x, this.arena.y + i); 
                this.ctx.lineTo(this.arena.x + this.arena.size, this.arena.y + i);
            }
            this.ctx.stroke();

            // วาดขอบอารีนา
            this.ctx.strokeStyle = "#e94560";
            this.ctx.lineWidth = 3;
            this.ctx.strokeRect(this.arena.x, this.arena.y, this.arena.size, this.arena.size);

            // ตัดขอบเขตการวาด (Clip) เพื่อไม่ให้อาวุธ/เอฟเฟกต์ล้นออกไปทับ UI
            this.ctx.save();
            this.ctx.beginPath();
            this.ctx.rect(this.arena.x, this.arena.y, this.arena.size, this.arena.size);
            this.ctx.clip();

            // Render Entities
            this.entities.forEach(e => {
                if(e.render) e.render(this.ctx);
            });

            // Render Players
            this.players.forEach(p => p.render(this.ctx));

            // Render Particles
            this.particles.forEach(p => {
                this.ctx.fillStyle = p.color;
                this.ctx.globalAlpha = p.life;
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                this.ctx.fill();
            });
            
            this.ctx.restore(); // ยกเลิกการ Clip ขอบเขต
            this.ctx.globalAlpha = 1.0;
        }

        requestAnimationFrame((t) => this.loop(t));
    }
};

// Start Engine
Engine.init();

</script>
</body>
</html>

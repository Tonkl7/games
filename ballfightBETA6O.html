        ctx.save(); ctx.translate(this.x, this.y);
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fillStyle = this.iFrames > 0 ? "#fff" : this.color; ctx.fill();
        ctx.lineWidth = 3; ctx.strokeStyle = "rgba(44, 36, 27, 0.5)"; ctx.stroke(); ctx.shadowBlur = 0; 
        if (this.bossDef.render) this.bossDef.render(ctx, this, game);
        ctx.restore(); ctx.fillStyle = "rgba(44, 36, 27, 0.9)"; ctx.font = "bold 16px 'Cinzel', serif"; ctx.textAlign="center"; ctx.fillText(this.bossDef.name, this.x, this.y - r - 15);
    }
    takeDamage(amount, type, source, game) {
        if (this.iFrames > 0) return; 
        this.hp = Math.max(0, this.hp - amount); 
        this.iFrames = MathUtils.getStat(this, 'iFrameDuration'); 
        
        let hsTime = MathUtils.getStat(source || this, 'hitStopDuration');
        game.triggerHitStop(hsTime);

        game.spawnParticles(this.x, this.y, 20, source ? source.color : "#fff");
        let dc = "#333"; if (type === "physical") dc = "#555"; else if (type === "pierce") dc = "#b89947"; else if (type === "blunt") dc = "#795548"; else if (type === "magic") dc = "#9c27b0"; else if (type === "burn") dc = "#d84315";
        game.spawnFloatingText(this.x, this.y, amount, dc);
        if (source && source.isPlayer && !source.ultimateActive && source.id) {
            source.ultimateGauge += 10; if (source.ultimateGauge >= 100) { source.ultimateGauge = 100; source.ultimateActive = true; source.ultimateTimer = 2000; if(source.weaponDef && source.weaponDef.onUltimateActivate) source.weaponDef.onUltimateActivate(source, game); game.spawnParticles(source.x, source.y, 40, "#d4af37"); }
        }
        if (this.bossDef.onTakeDamage) this.bossDef.onTakeDamage(this, source, game);
    }

const Engine = {
    canvas: document.getElementById('gameCanvas'),
    ctx: document.getElementById('gameCanvas').getContext('2d'),
    width: window.innerWidth, height: window.innerHeight,
    
    // Global Configs
    config: {
        arenaScale: 1.0,
        bgColor: "#e8e4d8",
        baseSpeedCap: 20,
        minSpeed: 5,
        collisionBounce: 1.05,
        maxCollisionSpeed: 40,
        iFrameDuration: 200,
        hitStopDuration: 50,
        wallBounce: 0.95,
        friction: 0.995,
        showHitboxes: false
    },
    
    arena: { x: 0, y: 0, size: 0, scale: 1.0 }, 
    actors: [], entities: [], particles: [],
    lastTime: 0, delta: 0, hitStop: 0, state: 'MENU', mode: '1v1',
    
    init() {
        window.addEventListener('resize', () => this.resizeCanvas());
        this.resizeCanvas(); this.buildMenuUI();
        document.getElementById('game-mode').addEventListener('change', (e) => { this.mode = e.target.value; this.buildMenuUI(); });
        document.getElementById('start-btn').addEventListener('click', () => { this.startGame(); });
        
        // Settings Sync
        const configKeys = ['arenaScale', 'baseSpeedCap', 'minSpeed', 'collisionBounce', 'maxCollisionSpeed', 'iFrameDuration', 'hitStopDuration', 'wallBounce', 'friction'];
        configKeys.forEach(k => {
            let el = document.getElementById(`cfg-${k}`);
            let valEl = document.getElementById(`val-${k}`);
            if(el) {
                el.value = this.config[k];
                if(valEl) valEl.innerText = this.config[k];
                el.addEventListener('input', e => {
                    let v = parseFloat(e.target.value);
                    this.config[k] = v;
                    if(valEl) valEl.innerText = v;
                    if(k === 'arenaScale') { this.arena.scale = v; this.resizeCanvas(); }
                });
            }
        });
        let chkHitbox = document.getElementById('cfg-showHitboxes');
        if(chkHitbox) {
            chkHitbox.checked = this.config.showHitboxes;
            chkHitbox.addEventListener('change', e => this.config.showHitboxes = e.target.checked);
        }
        let bgEl = document.getElementById('cfg-bgColor');
        if(bgEl) {
            bgEl.value = this.config.bgColor;
            bgEl.addEventListener('input', e => this.config.bgColor = e.target.value);
        }

        // Open Settings from Main Menu
        document.getElementById('menu-settings-btn').addEventListener('click', () => { 
            document.getElementById('settings-modal').style.display = 'flex'; 
            document.getElementById('quit-btn').style.display = 'none'; 
            document.getElementById('resume-btn').innerText = 'Close';
        });

        // Open Settings while Playing
        document.getElementById('settings-btn').addEventListener('click', () => { 
            this.state = 'PAUSED'; 
            document.getElementById('settings-modal').style.display = 'flex'; 
            document.getElementById('quit-btn').style.display = 'block';
            document.getElementById('resume-btn').innerText = 'Resume';
        });

        // Close Settings
        document.getElementById('resume-btn').addEventListener('click', () => { 
            document.getElementById('settings-modal').style.display = 'none'; 
            if(this.actors.length > 0) { 
                this.state = 'PLAYING'; 
                this.lastTime = performance.now(); 
            }
        });

        // Reset Settings
        document.getElementById('reset-settings-btn').addEventListener('click', () => {
            this.config = {
                arenaScale: 1.0,
                bgColor: "#e8e4d8",
                baseSpeedCap: 20,
                minSpeed: 5,
                collisionBounce: 1.05,
                maxCollisionSpeed: 40,
                iFrameDuration: 200,
                hitStopDuration: 50,
                wallBounce: 0.95,
                friction: 0.995,
                showHitboxes: false
            };
            this.arena.scale = 1.0;
            
            // Sync UI elements back to default values
            configKeys.forEach(k => {
                let el = document.getElementById(`cfg-${k}`);
                let valEl = document.getElementById(`val-${k}`);
                if(el) el.value = this.config[k];
                if(valEl) valEl.innerText = this.config[k];
            });
            
            let chkHitboxEl = document.getElementById('cfg-showHitboxes');
            if(chkHitboxEl) chkHitboxEl.checked = this.config.showHitboxes;

            // Sync Arena scale specifically
            let oldArenaScaleEl = document.getElementById('arena-scale');
            let oldArenaScaleVal = document.getElementById('arena-scale-val');
            if(oldArenaScaleEl) oldArenaScaleEl.value = 1.0;
            if(oldArenaScaleVal) oldArenaScaleVal.innerText = "100";

            let bgColEl = document.getElementById('cfg-bgColor');
            let oldBgColEl = document.getElementById('bg-color');
            if(bgColEl) bgColEl.value = this.config.bgColor;
            if(oldBgColEl) oldBgColEl.value = this.config.bgColor;

            this.resizeCanvas();
        });

        document.getElementById('quit-btn').addEventListener('click', () => {
            document.getElementById('settings-modal').style.display = 'none'; document.getElementById('game-ui').style.display = 'none';
            document.getElementById('settings-btn').style.display = 'none'; document.getElementById('menu').style.display = 'flex'; this.state = 'MENU';
            this.actors = []; 
        });

        requestAnimationFrame((t) => this.loop(t));
    },

    resizeCanvas() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        
        let isMobile = this.width <= 768;
        
        if (isMobile) {
            // Mobile Layout: Top & Bottom HUDs
            let hudH = this.state !== 'MENU' ? 120 : 0; 
            let availableW = this.width - 20; 
            let availableH = this.height - (hudH * 2) - 20;
            
            let baseSize = Math.max(1, Math.min(availableW, availableH));
            this.arena.size = baseSize * this.arena.scale;
            
            this.arena.x = (this.width - this.arena.size) / 2;
            this.arena.y = hudH + 10 + (availableH - this.arena.size) / 2;

            let sBtn = document.getElementById('settings-btn');
            if (sBtn) {
                sBtn.style.right = '10px';
                sBtn.style.bottom = (hudH + 10) + 'px';
            }
        } else {
            // Desktop Layout: Left & Right HUDs
            const hudWidth = 270;
            let availableW = this.width - (hudWidth * 2) - 60; 
            let availableH = this.height - 60;
            
            let baseSize = Math.max(1, Math.min(availableW, availableH));
            this.arena.size = baseSize * this.arena.scale;
            
            this.arena.x = hudWidth + 30 + (availableW - this.arena.size) / 2;
            this.arena.y = (this.height - this.arena.size) / 2;

            let sBtn = document.getElementById('settings-btn');
            if (sBtn) {
                sBtn.style.right = '280px';
                sBtn.style.bottom = '20px';
            }
        }
    },

    buildMenuUI() {
        const container = document.getElementById('setup-container'); container.innerHTML = "";
        const gw = () => { let h = ""; for(let w in WEAPON_REGISTRY) h += `<option value="${w}">${w}</option>`; return h; };
        const gb = () => { let h = ""; for(let b in BOSS_REGISTRY) h += `<option value="${b}">${b}</option>`; return h; };
        
        let team1Label = this.width <= 768 ? "P1 Weapon (Bottom):" : "P1 Weapon (Left):";
        let team2Label = this.width <= 768 ? "P2 Weapon (Top):" : "P2 Weapon (Right):";
        let pLabel = this.width <= 768 ? "Players (1-5, Bottom):" : "Players (1-5, Left):";
        let bLabel = this.width <= 768 ? "Bosses (1-2, Top):" : "Bosses (1-2, Right):";

        if (this.mode === '1v1') {
            container.innerHTML = `
                <div class="dynamic-row" style="border-left-color: var(--team1-color);"><label style="color:var(--text-main); font-weight:bold;">${team1Label}</label><select id="p1-w">${gw()}</select></div>
                <div class="dynamic-row" style="border-left-color: var(--team2-color);"><label style="color:var(--text-main); font-weight:bold;">${team2Label}</label><select id="p2-w">${gw()}</select></div>`;
            document.getElementById('p2-w').selectedIndex = 1; 
        } else {
            let div = document.createElement('div');
            div.innerHTML = `
                <div class="dynamic-row" style="border-left-color: var(--team1-color);"><label style="color:var(--text-main); font-weight:bold;">${pLabel}</label><input type="number" id="num-players" value="1" min="1" max="5"></div>
                <div id="player-list-container"></div>
                <div class="dynamic-row" style="margin-top:10px; border-left-color: var(--team2-color);"><label style="color:var(--text-main); font-weight:bold;">${bLabel}</label><input type="number" id="num-bosses" value="1" min="1" max="2"></div>
                <div id="boss-list-container"></div>`;
            container.appendChild(div);
            const update = () => {
                let pCount = MathUtils.clamp(parseInt(document.getElementById('num-players').value) || 1, 1, 5);
                let pHTML = ""; for(let i=1; i<=pCount; i++) pHTML += `<div class="dynamic-row" style="border-left: 2px solid var(--border-light); padding-left:25px;"><label>P${i} Weapon:</label><select class="bossmode-p-weapon">${gw()}</select></div>`;
                document.getElementById('player-list-container').innerHTML = pHTML;
                let bCount = MathUtils.clamp(parseInt(document.getElementById('num-bosses').value) || 1, 1, 2);
                let bHTML = ""; for(let i=1; i<=bCount; i++) bHTML += `<div class="dynamic-row" style="border-left: 2px solid var(--border-light); padding-left:25px;"><label>Boss ${i}:</label><select class="bossmode-boss-select">${gb()}</select></div>`;
                document.getElementById('boss-list-container').innerHTML = bHTML;
            };
            document.getElementById('num-players').addEventListener('input', update); document.getElementById('num-bosses').addEventListener('input', update);
            update();
        }
    },

    startGame() {
        document.getElementById('menu').style.display = 'none'; document.getElementById('game-ui').style.display = 'block'; document.getElementById('settings-btn').style.display = 'block';
        this.actors = []; this.entities = []; this.particles = []; this.hitStop = 0;
        let colorsP = ["#4169e1", "#4682b4", "#5f9ea0", "#20b2aa", "#6a5acd"]; // Muted Blues
        let colorsB = ["#e57373", "#ff8a65"]; // Bright reds for visibility on bright bg
        if (this.mode === '1v1') {
            this.actors.push(new Player("P1", 0, 0, colorsP[0], 1, document.getElementById('p1-w').value));
            this.actors.push(new Player("P2", 0, 0, colorsB[0], 2, document.getElementById('p2-w').value));
        } else {
            document.querySelectorAll('.bossmode-p-weapon').forEach((s, i) => this.actors.push(new Player(`P${i+1}`, 0, 0, colorsP[i], 1, s.value)));
            document.querySelectorAll('.bossmode-boss-select').forEach((s, i) => this.actors.push(new Boss(`B${i+1}`, 0, 0, s.value, 2)));
        }
        this.resizeCanvas();
        this.actors.forEach((a, i) => {
            if(a.team === 1) { a.x = this.arena.x + this.arena.size * 0.2; a.y = this.arena.y + this.arena.size * (0.2 + i*0.1); a.vx = MathUtils.getStat(a, 'baseSpeedCap')/2; }
            else { a.x = this.arena.x + this.arena.size * 0.8; a.y = this.arena.y + this.arena.size * (0.2 + (i-this.actors.filter(x=>x.team===1).length)*0.3); a.vx = -MathUtils.getStat(a, 'baseSpeedCap')/2; }
        });
        this.buildHUD(); this.lastTime = performance.now(); this.state = 'PLAYING';
    },

    buildHUD() {
        const header = document.getElementById('header'); const footer = document.getElementById('footer');
        header.innerHTML = ""; footer.innerHTML = "";
        const cPanel = (a, b) => `
            <div class="hud-panel" style="border-left-color:${b?'var(--team2-color)':'var(--team1-color)'}">
                <div class="hud-title" style="color:var(--text-main)">${b?a.bossDef.name:`${a.id} (${a.weaponDef.name})`}</div>
                <div class="stat-row"><span>HP</span><span id="${a.id}-hp-text">${a.maxHp}/${a.maxHp}</span></div>
                <div class="bar-container"><div class="hp-bar" id="${a.id}-hp" style="background:${a.color};width:100%"></div></div>
                ${a.isPlayer?`<div class="stat-row"><span style="color:var(--gold-dark)">Ult</span><span id="${a.id}-ult-text">0%</span></div><div class="bar-container"><div class="ult-bar" id="${a.id}-ult"></div></div>`:""}
                <div class="passive-text" id="${a.id}-passive">Passive: --</div>
            </div>`;
        this.actors.filter(a => a.team === 1).forEach(a => footer.innerHTML += cPanel(a, a.isBoss));
        this.actors.filter(a => a.team === 2).forEach(a => header.innerHTML += cPanel(a, a.isBoss));
    },

    updateHUD() {
        this.actors.forEach(a => {
            let hpB = document.getElementById(`${a.id}-hp`), hpT = document.getElementById(`${a.id}-hp-text`), pT = document.getElementById(`${a.id}-passive`);
            if(hpB) hpB.style.width = `${(a.hp / a.maxHp) * 100}%`;
            if(hpT) hpT.innerText = `${Math.ceil(a.hp)}/${a.maxHp}`;
            if(pT) pT.innerText = `Passive: ${a.passiveText || "--"}`;
            if(a.isPlayer) {
                let uB = document.getElementById(`${a.id}-ult`), uT = document.getElementById(`${a.id}-ult-text`);
                if(uB) { uB.style.width = `${a.ultimateGauge}%`; uB.style.background = a.ultimateActive?"#fff":"linear-gradient(90deg, #d4c4a8, var(--gold))"; }
                if(uT) uT.innerText = a.ultimateActive?"ACTIVE":`${Math.floor(a.ultimateGauge)}%`;
            }
        });
    },

    getEnemies(a) { return this.actors.filter(x => x.team !== a.team && x.hp > 0); },
    spawn(e) { this.entities.push(e); },
    spawnActor(actor) { 
        this.actors.push(actor); 
        this.buildHUD(); 
    },
    spawnParticles(x, y, c, col) { for(let i=0; i<c; i++) { let a = Math.random()*Math.PI*2, s = Math.random()*5+2; this.particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color:col,type:"particle"}); } },
    spawnFloatingText(x, y, amt, col) { this.spawn({x:x+(Math.random()*30-15),y:y-40,vx:(Math.random()-0.5)*2,vy:-2,lifetime:800,maxLife:800,text:Math.ceil(amt).toString(),color:col,type:"text",update(g){this.x+=this.vx*(g.delta/16);this.y+=this.vy*(g.delta/16);this.lifetime-=g.delta;},render(ctx){ctx.save();ctx.globalAlpha=Math.max(0,this.lifetime/this.maxLife);ctx.fillStyle=this.color;ctx.font="bold 24px 'Cinzel', serif";ctx.textAlign="center";ctx.strokeStyle="rgba(255,255,255,0.8)";ctx.lineWidth=3;ctx.strokeText(this.text,this.x,this.y);ctx.fillText(this.text,this.x,this.y);ctx.restore();}}); },
    triggerHitStop(ms) { this.hitStop = ms; },

    checkCollisions() {
        let active = this.actors.filter(a => a.hp > 0);

        // 1. Body vs Body (Physics & Simple Boss Damage)
        for(let i=0; i<active.length; i++) {
            for(let j=i+1; j<active.length; j++) {
                let a1 = active[i], a2 = active[j];
                let r1 = MathUtils.getStat(a1, 'actorRadius') ?? a1.radius;
                let r2 = MathUtils.getStat(a2, 'actorRadius') ?? a2.radius;
                let dist = Math.hypot(a2.x-a1.x, a2.y-a1.y), minDist = r1 + r2;
                
                if (dist < minDist) {
                    let overlap = minDist-dist, nx = (a2.x-a1.x)/dist, ny = (a2.y-a1.y)/dist;
                    a1.x-=nx*overlap/2; a1.y-=ny*overlap/2; a2.x+=nx*overlap/2; a2.y+=ny*overlap/2;
                    
                    let b1 = MathUtils.getStat(a1, 'collisionBounce');
                    let b2 = MathUtils.getStat(a2, 'collisionBounce');
                    
                    let tx = a1.vx, ty = a1.vy; 
                    a1.vx = a2.vx * b1; a1.vy = a2.vy * b1; 
                    a2.vx = tx * b2; a2.vy = ty * b2;
                    
                    // Fallback body damage
                    if(a1.isBoss && a2.isPlayer && a1.team!==a2.team && a1.bossDef.onHitPlayer) a1.bossDef.onHitPlayer(a1,a2,this);
                    else if(a2.isBoss && a1.isPlayer && a2.team!==a1.team && a2.bossDef.onHitPlayer) a2.bossDef.onHitPlayer(a2,a1,this);
                }
            }
        }

        // 2. Boss Custom Hitboxes vs Players
        let bossesWithHitboxes = active.filter(a => a.isBoss && a.bossDef.getHitboxes);
        bossesWithHitboxes.forEach(boss => {
            let hitboxes = boss.bossDef.getHitboxes(boss, this) || [];
            let players = this.getEnemies(boss).filter(p => p.isPlayer);
            players.forEach(p => {
                let pr = MathUtils.getStat(p, 'actorRadius') ?? p.radius;
                for (let hb of hitboxes) {
                    if (MathUtils.distance(hb.x, hb.y, p.x, p.y) < hb.r + pr) {
                        if (boss.bossDef.onHitPlayer) boss.bossDef.onHitPlayer(boss, p, this, hb);
                        break; // Only trigger one hit per frame per player
                    }
                }
            });
        });

        // 3. Weapons vs Bodies & Weapons vs Weapons
        active.filter(a=>a.isPlayer && a.weaponDef).forEach(att => {
            let enemies = this.getEnemies(att);
            let wHitboxes = att.weaponDef.getHitboxes ? 
                            att.weaponDef.getHitboxes(att, this) : 
                            [{ x: att.weaponX, y: att.weaponY, r: MathUtils.getStat(att, 'weaponHitboxRadius') ?? att.weaponHitboxRadius }];
            
            // Weapon vs Body
            enemies.forEach(t => { 
                let tr = MathUtils.getStat(t, 'actorRadius') ?? t.radius;
                for(let wh of wHitboxes) {
                    if(MathUtils.distance(wh.x, wh.y, t.x, t.y) < wh.r + tr) { 
                        if(att.weaponCooldown<=0 && att.weaponDef.onHitPlayer) att.weaponDef.onHitPlayer(att,t,this, wh); 
                        break; 
                    }
                }
            });

            // Weapon vs Weapon
            enemies.filter(e=>e.isPlayer && e.weaponDef).forEach(t => { 
                let tHitboxes = t.weaponDef.getHitboxes ? 
                                t.weaponDef.getHitboxes(t, this) : 
                                [{ x: t.weaponX, y: t.weaponY, r: MathUtils.getStat(t, 'weaponHitboxRadius') ?? t.weaponHitboxRadius }];
                
                let clashed = false;
                for(let wh of wHitboxes) {
                    for(let th of tHitboxes) {
                        if(MathUtils.distance(wh.x, wh.y, th.x, th.y) < wh.r + th.r) { 
                            if(att.weaponCooldown<=0 && att.weaponDef.onHitWeapon) att.weaponDef.onHitWeapon(att,t,this); 
                            if(t.weaponCooldown<=0 && t.weaponDef.onHitWeapon) t.weaponDef.onHitWeapon(t,att,this); 
                            clashed = true; break; 
                        }
                    }
                    if(clashed) break;
                }
            });
        });
    },

    checkWinCondition() {
        let t1 = this.actors.filter(a => a.team === 1 && a.hp > 0).length > 0, t2 = this.actors.filter(a => a.team === 2 && a.hp > 0).length > 0;
        if (!t1 || !t2) {
            this.state = 'GAMEOVER';
            setTimeout(() => { alert(`${t1 ? "Honor to the Players!" : "The Enemy Claims Victory!"}`); document.getElementById('menu').style.display='flex'; document.getElementById('game-ui').style.display='none'; document.getElementById('settings-btn').style.display='none'; this.state='MENU'; }, 1000);
        }
    },

    loop(timestamp) {
        this.delta = timestamp - this.lastTime; this.lastTime = timestamp;
        if (this.delta > 100) this.delta = 16; 
        
        // Background Color 
        this.ctx.fillStyle = this.config.bgColor; 
        this.ctx.fillRect(0, 0, this.width, this.height);
        
        let radius = Math.max(1, this.arena.size);
        // Dynamic Radial Gradient for Arena depth
        let gradient = this.ctx.createRadialGradient(
            this.arena.x + this.arena.size/2, this.arena.y + this.arena.size/2, 0,
            this.arena.x + this.arena.size/2, this.arena.y + this.arena.size/2, radius
        );
        gradient.addColorStop(0, "rgba(255, 255, 255, 0.95)");
        gradient.addColorStop(1, "rgba(235, 230, 220, 0.85)");
        
        this.ctx.fillStyle = gradient; 
        this.ctx.fillRect(this.arena.x, this.arena.y, this.arena.size, this.arena.size);
        
        // Minimal Grid (Faint dark lines)
        this.ctx.strokeStyle = "rgba(139, 121, 82, 0.15)"; 
        this.ctx.lineWidth = 1; 
        this.ctx.beginPath();
        for(let i=0; i<=this.arena.size; i+=50) { 
            this.ctx.moveTo(this.arena.x+i, this.arena.y); this.ctx.lineTo(this.arena.x+i, this.arena.y+this.arena.size); 
            this.ctx.moveTo(this.arena.x, this.arena.y+i); this.ctx.lineTo(this.arena.x+this.arena.size, this.arena.y+i); 
        }
        this.ctx.stroke();
        
        // Dimensional Medieval Borders
        this.ctx.strokeStyle = "#8b7952"; // Gold-dark border
        this.ctx.lineWidth = 3; 
        this.ctx.strokeRect(this.arena.x, this.arena.y, this.arena.size, this.arena.size);
        
        // Inner depth line
        this.ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
        this.ctx.lineWidth = 2;
        this.ctx.strokeRect(this.arena.x + 2, this.arena.y + 2, this.arena.size - 4, this.arena.size - 4);

        // Outer shadow/trim
        this.ctx.strokeStyle = "rgba(0, 0, 0, 0.1)";
        this.ctx.lineWidth = 4;
        this.ctx.strokeRect(this.arena.x - 2, this.arena.y - 2, this.arena.size + 4, this.arena.size + 4);
        
        // Clipping region for entities
        this.ctx.save(); 
        this.ctx.beginPath(); this.ctx.rect(this.arena.x, this.arena.y, this.arena.size, this.arena.size); this.ctx.clip();
        
        if (this.state === 'PLAYING') {
            if (this.hitStop > 0) this.hitStop -= this.delta;
            else {
                this.actors = this.actors.filter(a => a.hp > 0 || a.iFrames > 0);
                this.actors.forEach(a => a.update(this));
                this.checkCollisions();
                for (let i = this.entities.length-1; i>=0; i--) { this.entities[i].update(this); if (this.entities[i].lifetime <= 0) this.entities.splice(i, 1); }
                for (let i = this.particles.length-1; i>=0; i--) { if(this.particles[i].type === "particle") { this.particles[i].x += this.particles[i].vx*(this.delta/16); this.particles[i].y += this.particles[i].vy*(this.delta/16); this.particles[i].life -= 0.05*(this.delta/16); } if (this.particles[i].life <= 0) this.particles.splice(i, 1); }
                this.updateHUD(); this.checkWinCondition();
            }
        }
        
        if(this.state !== 'MENU') {
            this.entities.filter(e => e.type === "zone").forEach(e => e.render(this.ctx));
            this.actors.filter(a => a.hp > 0).forEach(a => a.render(this.ctx, this));
            this.entities.filter(e => e.type === "projectile").forEach(e => e.render(this.ctx));
            this.particles.forEach(p => { if(p.type === "particle") { this.ctx.fillStyle = p.color; this.ctx.globalAlpha = p.life; this.ctx.beginPath(); this.ctx.arc(p.x, p.y, 4, 0, Math.PI*2); this.ctx.fill(); } });
        }
        this.ctx.restore(); 
        
        if(this.state !== 'MENU') {
            this.entities.filter(e => e.type === "text").forEach(e => e.render(this.ctx));
            
            // --- DEBUG HITBOXES ---
            if (this.config.showHitboxes) {
                this.ctx.lineWidth = 2;
                this.actors.filter(a => a.hp > 0).forEach(a => {
                    let r = MathUtils.getStat(a, 'actorRadius') ?? a.radius;
                    this.ctx.strokeStyle = "rgba(0, 255, 255, 0.8)"; // Cyan: Body
                    this.ctx.beginPath(); this.ctx.arc(a.x, a.y, r, 0, Math.PI*2); this.ctx.stroke();
                    
                    if (a.isBoss && a.bossDef.getHitboxes) {
                        let bHitboxes = a.bossDef.getHitboxes(a, this) || [];
                        this.ctx.strokeStyle = "rgba(255, 165, 0, 0.8)"; // Orange: Boss Custom Hitboxes
                        bHitboxes.forEach(hb => {
                            this.ctx.beginPath(); this.ctx.arc(hb.x, hb.y, hb.r, 0, Math.PI*2); this.ctx.stroke();
                        });
                    }

                    if (a.isPlayer && a.weaponDef) {
                        let wHitboxes = a.weaponDef.getHitboxes ? 
                                        a.weaponDef.getHitboxes(a, this) : 
                                        [{ x: a.weaponX, y: a.weaponY, r: MathUtils.getStat(a, 'weaponHitboxRadius') ?? a.weaponHitboxRadius }];
                        this.ctx.strokeStyle = "rgba(255, 0, 0, 0.8)"; // Red: Weapons
                        wHitboxes.forEach(hb => {
                            this.ctx.beginPath(); this.ctx.arc(hb.x, hb.y, hb.r, 0, Math.PI*2); this.ctx.stroke();
                        });
                    }
                });
                this.entities.forEach(e => {
                    this.ctx.strokeStyle = e.type === "zone" ? "rgba(255, 255, 0, 0.8)" : "rgba(0, 255, 0, 0.8)";
                    if (e.getHitboxes) {
                        let hbs = e.getHitboxes() || [];
                        hbs.forEach(hb => {
                            this.ctx.beginPath(); this.ctx.arc(hb.x, hb.y, hb.r, 0, Math.PI*2); this.ctx.stroke();
                        });
                    } else if (e.radius) {
                        this.ctx.beginPath(); this.ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); this.ctx.stroke();
                    }
                });
            }
        }
        
        requestAnimationFrame((t) => this.loop(t));
    }
};

/**
 * ------------------------------------------------------------------
 * SAFETY SYSTEM
 * ------------------------------------------------------------------
 */
const SafetySystem = {
    logError(m, c, e) { console.error(`[Safety] 🚨 ${m} [${c}]:`, e); },
    createSafeFunction(m, c, f) {
        if (typeof f !== 'function') return f;
        return function(...a) { try { if (!f) return; return f.apply(this, a); } catch (err) { SafetySystem.logError(m, c, err); } };
    },
    safeguardWeapon(n, d) {
        if (!d || typeof d !== 'object') return null;
        ['init', 'onUpdate', 'render', 'onHitPlayer', 'onHitWeapon', 'onTakeDamage', 'onUltimateActivate', 'getHitboxes'].forEach(h => { if (typeof d[h] === 'function') d[h] = this.createSafeFunction(`Weapon:${n}`, h, d[h]); });
        return d;
    },
    safeguardBoss(n, d) {
        if (!d || typeof d !== 'object') return null;
        ['init', 'onUpdate', 'render', 'onHitPlayer', 'onTakeDamage', 'getHitboxes'].forEach(h => { if (typeof d[h] === 'function') d[h] = this.createSafeFunction(`Boss:${n}`, h, d[h]); });
        return d;
    },
    applyWrappers() {
        for (let n in WEAPON_REGISTRY) WEAPON_REGISTRY[n] = this.safeguardWeapon(n, WEAPON_REGISTRY[n]);
        for (let n in BOSS_REGISTRY) BOSS_REGISTRY[n] = this.safeguardBoss(n, BOSS_REGISTRY[n]);
        const oS = Engine.spawn; Engine.spawn = function(e) { if (!e) return; ['update', 'render', 'getHitboxes'].forEach(h => { if (typeof e[h] === 'function') e[h] = SafetySystem.createSafeFunction(`Entity`, h, e[h]); }); oS.call(this, e); };
        const oA = Actor.prototype.addStatus; Actor.prototype.addStatus = function(e) { if (!e) return; if (typeof e.update === 'function') e.update = SafetySystem.createSafeFunction(`Status`, 'update', e.update); oA.call(this, e); };
    }
};

SafetySystem.applyWrappers();
Engine.init();

</script>
